<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Free Gen · member zone</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0c0f17;
      color: #edf2fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* header */
    .header {
      background: #111623;
      border-bottom: 1px solid #293040;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1.2rem;
    }

    .logo h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(145deg, #b28bff, #6eb8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .live-indicator {
      background: #19232f;
      border-radius: 40px;
      padding: 0.4rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #3f506d;
    }

    .dot {
      width: 12px;
      height: 12px;
      background: #2ef27c;
      border-radius: 50%;
      box-shadow: 0 0 12px #2ef27c;
    }

    .total-stock-badge {
      background: #1d2a3c;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-weight: 500;
      border: 1px solid #415570;
    }

    /* main */
    .container {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 2rem;
      width: 100%;
      flex: 1;
    }

    .section-head {
      font-size: 1.8rem;
      font-weight: 650;
      margin-bottom: 2rem;
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .section-head span {
      background: #28344a;
      font-size: 1rem;
      padding: 0.2rem 1.2rem;
      border-radius: 30px;
    }

    /* generator grid */
    .gen-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.8rem;
      margin-bottom: 3.5rem;
    }

    .card {
      background: #151e2b;
      border-radius: 28px;
      padding: 1.8rem 1.4rem 1.6rem;
      border: 1px solid #2e3c53;
      box-shadow: 0 10px 0 #0b111a;
      transition: 0.15s;
    }

    .card:hover {
      border-color: #5d79b9;
    }

    .card-icon {
      font-size: 2.8rem;
      margin-bottom: 0.6rem;
    }

    .card-title {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    /* stock display — only number, no extra noise */
    .stock-simple {
      margin: 1.2rem 0 1.6rem;
      background: #101724;
      border-radius: 60px;
      padding: 0.7rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #314159;
    }

    .stock-label {
      font-weight: 500;
      color: #a7bae2;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stock-number {
      font-weight: 700;
      font-size: 1.8rem;
      color: #d6e5ff;
      background: #1f2a3e;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
    }

    .gen-btn {
      width: 100%;
      background: #273752;
      border: none;
      color: white;
      font-size: 1.3rem;
      font-weight: 600;
      padding: 0.9rem 0;
      border-radius: 50px;
      border-bottom: 4px solid #172132;
      cursor: pointer;
      transition: 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .gen-btn.active {
      background: #4b379b;
      background: linear-gradient(145deg, #5741b5, #2f4c9e);
      border-bottom-color: #1e2852;
    }

    .gen-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      background: #303f58;
      border-bottom-color: #1f283b;
    }

    .cooldown-badge {
      background: #0a121f;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-size: 0.9rem;
    }

    /* bottom panel: file tabs + account view */
    .files-panel {
      background: #131c2a;
      border-radius: 32px;
      padding: 2rem;
      border: 1px solid #334153;
      margin-top: 2rem;
    }

    .panel-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1.2rem;
      margin-bottom: 1.8rem;
    }

    .file-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .file-tab {
      background: #1e2a3b;
      padding: 0.5rem 1.4rem;
      border-radius: 40px;
      font-size: 0.95rem;
      border: 1px solid #3d4c67;
      color: #bfd0f0;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: 0.1s;
    }

    .file-tab.active-tab {
      background: #314a70;
      border-color: #7293df;
      color: white;
    }

    .restock-note {
      background: #1a2537;
      padding: 0.4rem 1.4rem;
      border-radius: 40px;
      font-size: 0.9rem;
      border: 1px solid #415977;
    }

    /* account display with copy button integration */
    .account-view {
      background: #0f1724;
      border-radius: 28px;
      padding: 1.8rem;
      border: 1px solid #37465f;
    }

    .account-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      gap: 12px;
    }

    .filename-badge {
      background: #1f2f45;
      padding: 0.3rem 1.2rem;
      border-radius: 30px;
      font-family: 'Monaco', monospace;
      font-size: 1.1rem;
      border: 1px solid #50648b;
    }

    .copy-special-btn {
      background: #25344d;
      border: none;
      color: white;
      padding: 0.5rem 1.6rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      border-bottom: 2px solid #111c2c;
      transition: 0.1s;
    }

    .copy-special-btn:hover {
      background: #2f405e;
    }

    .account-lines {
      background: #0a111c;
      border-radius: 20px;
      padding: 1.5rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.8;
      color: #c4d4ff;
      font-size: 0.95rem;
      border: 1px solid #314159;
      max-height: 270px;
      overflow-y: auto;
    }

    .line-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.3rem 0;
      border-bottom: 1px dashed #2a3448;
    }

    .line-item:last-child {
      border-bottom: none;
    }

    .copy-line-btn {
      background: #1e3149;
      border: none;
      color: #b3caff;
      padding: 0.2rem 1rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.1s;
      border: 1px solid #3f5579;
    }

    .copy-line-btn:hover {
      background: #2c405e;
      color: white;
    }

    .flash-msg {
      color: #b7f0c3;
      background: #1d3929;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      font-size: 0.8rem;
    }

    .footer {
      text-align: center;
      color: #617291;
      padding: 2rem;
      border-top: 1px solid #202838;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">
      <h1>⚡ Pro Free Gen</h1>
    </div>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <div class="live-indicator">
        <span class="dot"></span>
        <span>auto‑restock active</span>
      </div>
      <div class="total-stock-badge" id="totalStockDisplay">total: 30</div>
    </div>
  </header>

  <main class="container">
    <div class="section-head">
      🧰 generator hub <span>click to generate & copy</span>
    </div>

    <!-- generator grid injected -->
    <div class="gen-grid" id="generatorGrid"></div>

    <!-- ACCOUNT FILES PANEL (like netflix.txt, etc) -->
    <div class="files-panel">
      <div class="panel-bar">
        <div class="file-tabs" id="fileTabs"></div>
        <div class="restock-note" id="restockMessage">⏱️ restock every 45s (simulated)</div>
      </div>

      <!-- dynamic file viewer with inline copy buttons -->
      <div class="account-view" id="accountView">
        <div class="account-header">
          <span class="filename-badge" id="currentFileLabel">📄 netflix.txt</span>
          <button class="copy-special-btn" id="copyAllBtn">📋 COPY ALL</button>
        </div>
        <div class="account-lines" id="accountLinesContainer">
          <!-- lines appear here -->
        </div>
      </div>
      <div style="margin-top: 0.8rem; color: #829ac2; font-style: italic; padding-left: 0.5rem;">
        ⚡ email:pass · click 📋 to copy single line
      </div>
    </div>
  </main>

  <footer class="footer">
    <span>✨ member area · 10 min cooldown per generator · instant copy</span>
  </footer>

  <script>
    (function() {
      // ---------- ACCOUNT FILES (like .txt) ----------
      const FILES = {
        netflix:   [ "stream@homeflix.com:hdpass1", "movie@night.com:netflix23", "series@binge.tv:watcher99", "uhd@family.com:4k4all", "suspense@ thrill.com:edge" ],
        xbox:      [ "live@gamer.com:goldlive", "forza@motorsport.net:drivilate", "halo@masterchief.com:117reborn", "gamepass@ultimate.com:gpult12", "xbox360@back compat:rare" ],
        minecraft: [ "steve@pickaxe.net:creeper", "enderman@ender.com:pearl12", "nether@fortress.com:blaze99", "build@craft.com:redstone", "craftmaster@block.com:diamond" ],
        spotify:   [ "premium@family.com:spotify1", "playlist@daily.com:discover22", "podcast@audio.com:acct2024", "dance@hit.com:party123", "student@uni.com:discount", "rock@classic.com:queen" ],
        disney:    [ "starwars@force.com:jedi", "marvel@avengers.com:thanos", "pixar@lightyear.com:toyStory", "frozen@arenda.com:elsa", "mickey@mouse.com:disney123", "nationalgeo@wild.com:natgeo" ]
      };

      // stock object based on file lengths
      let stock = {
        netflix: FILES.netflix.length,
        xbox: FILES.xbox.length,
        minecraft: FILES.minecraft.length,
        spotify: FILES.spotify.length,
        disney: FILES.disney.length
      };

      // cooldown tracking (seconds) – 10 minutes = 600
      const COOLDOWN_TIME = 600; // 10 min
      let cooldowns = {
        netflix: 0,
        xbox: 0,
        minecraft: 0,
        spotify: 0,
        disney: 0
      };

      // current file tab
      let currentFile = 'netflix';

      // helper: update total stock display
      function updateTotalStock() {
        const total = Object.values(stock).reduce((acc, val) => acc + val, 0);
        document.getElementById('totalStockDisplay').innerText = `total: ${total}`;
      }

      // ---------- RENDER GENERATOR GRID (clean stock numbers) ----------
      const categories = [
        { id: 'netflix', name: 'NETFLIX', icon: '🎬' },
        { id: 'xbox', name: 'XBOX', icon: '🎮' },
        { id: 'minecraft', name: 'MINECRAFT', icon: '⛏️' },
        { id: 'spotify', name: 'SPOTIFY', icon: '🎧' },
        { id: 'disney', name: 'DISNEY+', icon: '✨' }
      ];

      function renderGrid() {
        const grid = document.getElementById('generatorGrid');
        grid.innerHTML = '';
        categories.forEach(cat => {
          const id = cat.id;
          const cooldownActive = cooldowns[id] > 0;
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="card-icon">${cat.icon}</div>
            <div class="card-title">${cat.name}</div>
            <div class="stock-simple">
              <span class="stock-label">📦 in stock</span>
              <span class="stock-number" id="stock-${id}">${stock[id]}</span>
            </div>
            <button class="gen-btn ${!cooldownActive ? 'active' : ''}" data-gen="${id}" id="btn-${id}" ${cooldownActive ? 'disabled' : ''}>
              ⚡ GENERATE
              ${cooldownActive ? `<span class="cooldown-badge" id="cd-${id}">${cooldowns[id]}s</span>` : ''}
            </button>
          `;
          grid.appendChild(card);
        });
        updateTotalStock();
      }

      // refresh stock numbers in grid
      function refreshStockUI() {
        categories.forEach(c => {
          const el = document.getElementById(`stock-${c.id}`);
          if (el) el.innerText = stock[c.id];
        });
        updateTotalStock();
      }

      // refresh cooldown badges
      function refreshCooldownUI() {
        categories.forEach(c => {
          const btn = document.getElementById(`btn-${c.id}`);
          const cdSpan = document.getElementById(`cd-${c.id}`);
          if (!btn) return;
          if (cooldowns[c.id] > 0) {
            btn.disabled = true;
            if (!cdSpan) {
              const badge = document.createElement('span');
              badge.className = 'cooldown-badge';
              badge.id = `cd-${c.id}`;
              badge.innerText = `${cooldowns[c.id]}s`;
              btn.appendChild(badge);
            } else {
              cdSpan.innerText = `${cooldowns[c.id]}s`;
            }
            btn.classList.remove('active');
          } else {
            btn.disabled = false;
            btn.classList.add('active');
            if (cdSpan) cdSpan.remove();
          }
        });
      }

      // ---------- FILE TABS RENDER ----------
      function renderFileTabs() {
        const container = document.getElementById('fileTabs');
        container.innerHTML = '';
        Object.keys(FILES).forEach(key => {
          const tab = document.createElement('span');
          tab.className = `file-tab ${currentFile === key ? 'active-tab' : ''}`;
          tab.setAttribute('data-file', key);
          tab.innerHTML = `📁 ${key}.txt (${FILES[key].length})`;
          tab.addEventListener('click', () => {
            currentFile = key;
            renderFileTabs();
            displayCurrentFileContent();
          });
          container.appendChild(tab);
        });
      }

      // display current file content with inline copy buttons
      function displayCurrentFileContent() {
        const lines = FILES[currentFile] || [];
        const container = document.getElementById('accountLinesContainer');
        const label = document.getElementById('currentFileLabel');
        label.innerHTML = `📄 ${currentFile}.txt`;

        if (!lines.length) {
          container.innerHTML = '<div class="line-item">📭 empty file, restock in progress</div>';
          return;
        }

        let html = '';
        lines.forEach((line, idx) => {
          const lineForCopy = line.replace(/[\\"]/g, '\\$&'); // escape for copy
          html += `
            <div class="line-item">
              <span>${idx+1}. ${line}</span>
              <button class="copy-line-btn" data-copy="${line.replace(/"/g, '&quot;')}">📋 copy</button>
            </div>
          `;
        });
        container.innerHTML = html;

        // attach copy events to each line button
        document.querySelectorAll('.copy-line-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const textToCopy = btn.getAttribute('data-copy');
            navigator.clipboard.writeText(textToCopy).then(() => {
              const original = btn.innerText;
              btn.innerText = '✅ copied!';
              setTimeout(() => { btn.innerText = original; }, 1000);
            }).catch(() => alert('press Ctrl+C'));
          });
        });
      }

      // "copy all" button functionality
      document.getElementById('copyAllBtn').addEventListener('click', () => {
        const lines = FILES[currentFile] || [];
        if (lines.length === 0) return;
        const allText = lines.join('\n');
        navigator.clipboard.writeText(allText).then(() => {
          const btn = document.getElementById('copyAllBtn');
          const orig = btn.innerText;
          btn.innerText = '✅ COPIED ALL';
          setTimeout(() => { btn.innerText = orig; }, 1400);
        });
      });

      // ---------- GENERATE ACTION ----------
      function handleGenerate(genId) {
        if (cooldowns[genId] > 0) return;
        if (stock[genId] <= 0) {
          alert(`⛔ No ${genId} accounts left. Wait for restock.`);
          return;
        }

        const fileArray = FILES[genId];
        if (!fileArray || fileArray.length === 0) {
          alert('stock empty, restock in seconds');
          return;
        }

        // generate = take first account
        const generated = fileArray.shift();
        stock[genId] = fileArray.length;

        // set cooldown
        cooldowns[genId] = COOLDOWN_TIME;

        // show generated account + copy option directly
        if (confirm(`✅ ${genId.toUpperCase()} ACCOUNT GENERATED!\n\n${generated}\n\nPress OK to copy to clipboard`)) {
          navigator.clipboard.writeText(generated).catch(() => {});
        }

        // update UI
        refreshStockUI();
        refreshCooldownUI();

        // if current open file is the same, refresh view
        if (currentFile === genId) {
          displayCurrentFileContent();
        }
        renderFileTabs();  // update tab counts

        // start cooldown timer
        const interval = setInterval(() => {
          if (cooldowns[genId] > 0) {
            cooldowns[genId] -= 1;
            refreshCooldownUI();
          } else {
            clearInterval(interval);
            refreshCooldownUI();
          }
        }, 1000);
      }

      // grid event delegation
      document.getElementById('generatorGrid').addEventListener('click', (e) => {
        const btn = e.target.closest('.gen-btn');
        if (!btn || btn.disabled) return;
        const genId = btn.getAttribute('data-gen');
        if (genId) handleGenerate(genId);
      });

      // ---------- AUTO RESTOCK (simulate file update) ----------
      function restockAllFiles() {
        Object.keys(FILES).forEach(key => {
          const arr = FILES[key];
          const domains = ['gmail.com', 'outlook.com', 'proton.me', 'yahoo.com'];
          const randName = `user${Math.floor(Math.random()*900+100)}`;
          const domain = domains[Math.floor(Math.random() * domains.length)];
          const pass = Math.random().toString(36).substring(2, 10);
          const newLine = `${randName}@${domain}:${pass}`;
          arr.push(newLine);
          if (arr.length > 12) arr.shift(); // keep manageable
          stock[key] = arr.length;
        });

        refreshStockUI();
        renderFileTabs();
        displayCurrentFileContent(); // reflect changes in current file
        document.getElementById('restockMessage').innerHTML = '🔄 restock + new line (just now)';
        setTimeout(() => {
          document.getElementById('restockMessage').innerHTML = '⏱️ restock every 45s (simulated)';
        }, 2000);
      }

      // initial renders
      renderGrid();
      renderFileTabs();
      displayCurrentFileContent();
      refreshCooldownUI();
      updateTotalStock();

      // auto restock interval (45 sec)
      setInterval(restockAllFiles, 45000);
      // extra restock after 5 sec to show activity
      setTimeout(restockAllFiles, 5000);

    })();
  </script>
</body>
</html>
