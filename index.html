<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Free Gen · member area</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0b0e14;
      color: #e9edf5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* header */
    .top-bar {
      background: #10131c;
      border-bottom: 1px solid #2a2f3c;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(130deg, #a371f7, #70c8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .live-badge {
      background: #1f2a3a;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #3e4b5d;
    }

    .live-dot {
      width: 12px;
      height: 12px;
      background: #3fe87c;
      border-radius: 20px;
      box-shadow: 0 0 10px #3fe87c;
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } }

    .live-text {
      font-weight: 500;
      color: #bcc9e8;
    }

    .stock-counter {
      background: #1e2532;
      padding: 0.4rem 1rem;
      border-radius: 30px;
      font-size: 0.95rem;
      border: 1px solid #3f4a5c;
    }

    /* main container */
    .container {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 2rem;
      flex: 1;
      width: 100%;
    }

    .section-title {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title span {
      background: #2d3548;
      font-size: 1rem;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      color: #b5c8ff;
    }

    /* generator grid */
    .gen-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .gen-card {
      background: #171d28;
      border-radius: 28px;
      padding: 1.6rem 1.4rem;
      border: 1px solid #2b3445;
      transition: 0.2s;
      box-shadow: 0 8px 0 #0c0f16;
    }

    .gen-card:hover {
      border-color: #5f7bbf;
      transform: translateY(-3px);
    }

    .gen-icon {
      font-size: 2.6rem;
      margin-bottom: 1rem;
    }

    .gen-name {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .stock-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 1.2rem 0 1.6rem;
      background: #121724;
      padding: 0.7rem 1rem;
      border-radius: 60px;
    }

    .stock-available {
      background: #293145;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #b9d2ff;
    }

    .stock-number {
      font-weight: 700;
      font-size: 1.5rem;
      color: #d0e0ff;
    }

    .gen-btn {
      width: 100%;
      background: #2c3c5c;
      border: none;
      color: white;
      font-weight: 600;
      font-size: 1.2rem;
      padding: 0.9rem 0;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.15s;
      border-bottom: 3px solid #1d2638;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .gen-btn.active {
      background: #4c3399;
      background: linear-gradient(145deg, #5d42b5, #374f9a);
      border-bottom-color: #1b2352;
    }

    .gen-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      background: #2e3a4e;
      border-bottom-color: #1f2637;
    }

    .cooldown-badge {
      font-size: 0.8rem;
      background: #111722;
      padding: 0.3rem 0.7rem;
      border-radius: 30px;
      color: #a5c1ff;
    }

    /* accounts panel */
    .accounts-panel {
      background: #131a26;
      border-radius: 32px;
      padding: 2rem;
      border: 1px solid #303c50;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1.8rem;
    }

    .file-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .file-tab {
      background: #1d2838;
      padding: 0.5rem 1.3rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #aebddb;
      border: 1px solid #374357;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: 0.1s;
    }

    .file-tab.active-tab {
      background: #394e72;
      color: white;
      border-color: #6c8cd9;
    }

    .restock-info {
      color: #aac3ff;
      background: #1b2332;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-size: 0.95rem;
    }

    .account-list {
      background: #0f151f;
      border-radius: 24px;
      padding: 1.5rem;
      border: 1px solid #2b354b;
      min-height: 200px;
      font-family: 'Monaco', 'Menlo', monospace;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
      color: #cfdefa;
      font-size: 0.95rem;
    }

    .dummy-note {
      color: #8d9ac0;
      margin-top: 1rem;
      font-style: italic;
      border-left: 4px solid #425479;
      padding-left: 1rem;
    }

    /* footer */
    .footer {
      text-align: center;
      margin-top: 3rem;
      color: #5b6a85;
      border-top: 1px solid #212837;
      padding: 1.5rem;
    }

    .flash-message {
      background: #16273f;
      border-radius: 50px;
      padding: 0.7rem 1.5rem;
      border: 1px solid #527ac2;
      display: inline-block;
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <div class="logo">
      <h1>⚡ Pro Free Gen</h1>
    </div>
    <div style="display: flex; gap: 15px; align-items: center;">
      <div class="live-badge">
        <span class="live-dot"></span>
        <span class="live-text">LIVE · auto‑restock</span>
      </div>
      <div class="stock-counter" id="globalStockDisplay">accounts: 47</div>
    </div>
  </header>

  <div class="container">
    <!-- all generators section -->
    <div class="section-title">
      📦 generator categories <span>click to generate</span>
    </div>
    <div class="gen-grid" id="generatorGrid"></div>

    <!-- accounts panel (simulated .txt files) -->
    <div class="accounts-panel">
      <div class="panel-header">
        <div class="file-tabs" id="fileTabsContainer">
          <!-- dynamic file tabs injected via js -->
        </div>
        <div class="restock-info" id="autoRestockBadge">
          🔄 restock every 45s (simulated)
        </div>
      </div>

      <!-- account list display (like netflix.txt content) -->
      <div class="account-list" id="accountListDisplay">
        [select a file tab to view accounts]
      </div>
      <div class="dummy-note" id="liveNote">
        ⚡ email:pass format · auto-generated · stock live
      </div>
    </div>
  </div>

  <footer class="footer">
    <span class="flash-message">✨ pro free gen · 10 min cooldown per account · member area</span>
  </footer>

  <script>
    (function() {
      // ------- SIMULATED AUTO RESTOCK FILES (like netflix.txt, xbox.txt, minecraft.txt) -------
      // each file is an array of "email:pass" strings, restock simulates pushing new lines.
      const ACCOUNT_FILES = {
        netflix:   [ "family@tv.com:flix2024", "stream@home.com:pass123", "hd@watch.com:netflix1", "movie@time.com:hdpass", "series@binge.com:test42" ],
        xbox:      [ "gamer@live.com:xbox360", "halo@master.com:chief117", "forza@race.com:drivatars", "gamepass@outlook.com:passlive", "xbox@play.com:gold22" ],
        minecraft: [ "craft@block.com:diamond", "steve@pickaxe.net:creeper", "enderman@ender.com:pearl12", "nether@fortress.com:blaze99", "build@craft.com:redstone" ],
        spotify:   [ "premium@music.com:family1", "playlist@spot.com:dailyMix", "podcast@audio.com:acct2023", "discover@weekly.com:track99", "dance@hit.com:party" ],
        disney:    [ "starwars@force.com:jedi", "marvel@avengers.com:thanos", "pixar@lightyear.com:toyStory", "frozen@arenda.com:elsa", "mickey@mouse.com:disney123" ]
      };

      // ----- stock counters (dynamic) - we'll sync from files length
      let stock = {
        netflix: ACCOUNT_FILES.netflix.length,
        xbox: ACCOUNT_FILES.xbox.length,
        minecraft: ACCOUNT_FILES.minecraft.length,
        spotify: ACCOUNT_FILES.spotify.length,
        disney: ACCOUNT_FILES.disney.length
      };

      // ----- cooldown tracker per user (member) - 10 minutes (600 seconds)
      const cooldowns = {
        netflix: 0,
        xbox: 0,
        minecraft: 0,
        spotify: 0,
        disney: 0
      };
      const COOLDOWN_SEC = 600; // 10 min = 600 sec

      // last selected file tab
      let currentFile = 'netflix';   // default

      // helper to update global stock display
      function updateGlobalStock() {
        const total = Object.values(stock).reduce((a, b) => a + b, 0);
        document.getElementById('globalStockDisplay').innerText = `accounts: ${total}`;
      }

      // render generator cards
      const categories = [
        { id: 'netflix', name: 'NETFLIX', icon: '🎬', bg: '#b1060e' },
        { id: 'xbox', name: 'XBOX', icon: '🎮', bg: '#107c10' },
        { id: 'minecraft', name: 'MINECRAFT', icon: '⛏️', bg: '#5a2d0c' },
        { id: 'spotify', name: 'SPOTIFY', icon: '🎧', bg: '#1db954' },
        { id: 'disney', name: 'DISNEY+', icon: '✨', bg: '#113c7a' }
      ];

      function renderGenerators() {
        const grid = document.getElementById('generatorGrid');
        grid.innerHTML = '';
        categories.forEach(cat => {
          const id = cat.id;
          const cooldownActive = cooldowns[id] > 0;
          const card = document.createElement('div');
          card.className = 'gen-card';
          card.innerHTML = `
            <div class="gen-icon">${cat.icon}</div>
            <div class="gen-name">${cat.name}</div>
            <div class="stock-row">
              <span class="stock-available">📊 STOCK</span>
              <span class="stock-number" id="stock-${id}">${stock[id]}</span>
            </div>
            <button class="gen-btn ${!cooldownActive ? 'active' : ''}" data-gen="${id}" id="btn-${id}" ${cooldownActive ? 'disabled' : ''}>
              ⚡ GENERATE
              ${cooldownActive ? `<span class="cooldown-badge" id="cd-${id}">${cooldowns[id]}s</span>` : ''}
            </button>
          `;
          grid.appendChild(card);
        });
        updateGlobalStock();
      }

      // update stock numbers in UI
      function refreshStockUI() {
        categories.forEach(c => {
          const el = document.getElementById(`stock-${c.id}`);
          if (el) el.innerText = stock[c.id];
        });
        updateGlobalStock();
      }

      // update cooldown badges and buttons
      function refreshCooldownUI() {
        categories.forEach(c => {
          const btn = document.getElementById(`btn-${c.id}`);
          const cdSpan = document.getElementById(`cd-${c.id}`);
          if (!btn) return;
          if (cooldowns[c.id] > 0) {
            btn.disabled = true;
            if (!cdSpan) {
              // create badge if missing
              const badge = document.createElement('span');
              badge.className = 'cooldown-badge';
              badge.id = `cd-${c.id}`;
              badge.innerText = `${cooldowns[c.id]}s`;
              btn.appendChild(badge);
            } else {
              cdSpan.innerText = `${cooldowns[c.id]}s`;
            }
            btn.classList.remove('active');
          } else {
            btn.disabled = false;
            btn.classList.add('active');
            if (cdSpan) cdSpan.remove();
          }
        });
      }

      // render file tabs (netflix.txt, xbox.txt etc)
      function renderFileTabs() {
        const container = document.getElementById('fileTabsContainer');
        container.innerHTML = '';
        const fileKeys = Object.keys(ACCOUNT_FILES);
        fileKeys.forEach(key => {
          const tab = document.createElement('span');
          tab.className = `file-tab ${currentFile === key ? 'active-tab' : ''}`;
          tab.setAttribute('data-file', key);
          tab.innerHTML = `📄 ${key}.txt (${ACCOUNT_FILES[key].length})`;
          tab.addEventListener('click', (e) => {
            currentFile = key;
            renderFileTabs();     // re-render active
            updateAccountDisplay();
          });
          container.appendChild(tab);
        });
      }

      // display content of selected account file
      function updateAccountDisplay() {
        const listDiv = document.getElementById('accountListDisplay');
        const lines = ACCOUNT_FILES[currentFile] || [];
        if (lines.length === 0) {
          listDiv.innerText = `📭 ${currentFile}.txt is empty — restock incoming soon.`;
          return;
        }
        // show each line, like a text file
        let content = `===== ${currentFile}.txt ===== (${lines.length} live)\n`;
        lines.forEach((line, idx) => {
          content += `${idx+1}. ${line}\n`;
        });
        listDiv.innerText = content;
      }

      // ----- simulate restock (automatic file like netflix.txt and others)
      function restockFiles() {
        // for each file, sometimes push a fresh random email:pass
        Object.keys(ACCOUNT_FILES).forEach(key => {
          const arr = ACCOUNT_FILES[key];
          // simulate restock: add new line with random name
          const domains = ['gmail.com', 'outlook.com', 'yahoo.com', 'proton.me'];
          const randName = `user${Math.floor(Math.random()*9000+1000)}`;
          const randDomain = domains[Math.floor(Math.random() * domains.length)];
          const newPass = Math.random().toString(36).substring(2, 10);
          const newLine = `${randName}@${randDomain}:${newPass}`;
          arr.push(newLine);
          // keep reasonable size (max 12 lines for demo)
          if (arr.length > 12) arr.shift();

          // update stock counter
          stock[key] = arr.length;
        });
        // also add a special line to netflix for demo flavor
        // update UI
        refreshStockUI();
        renderFileTabs();          // update tab counts
        updateAccountDisplay();    // refresh shown file
        document.getElementById('autoRestockBadge').innerHTML = '🔄 restock +1 line just now (simulated)';
        setTimeout(() => {
          document.getElementById('autoRestockBadge').innerHTML = '🔄 restock every 45s (simulated)';
        }, 2000);
      }

      // ---- generate action ----
      function handleGenerate(genId) {
        // check cooldown
        if (cooldowns[genId] > 0) return;

        // check stock
        if (stock[genId] <= 0) {
          alert(`❌ No ${genId} accounts left. Wait for restock.`);
          return;
        }

        // "generate" = take first account from corresponding file
        const fileArray = ACCOUNT_FILES[genId];
        if (!fileArray || fileArray.length === 0) {
          alert('stock temporary empty, try later');
          return;
        }

        // get the first account (simulate generation)
        const generatedAccount = fileArray.shift();   // remove from array
        // update stock counter
        stock[genId] = fileArray.length;

        // set cooldown
        cooldowns[genId] = COOLDOWN_SEC;

        // show generated account in a friendly alert (simulate gen popup)
        alert(`✅ ${genId.toUpperCase()} ACCOUNT GENERATED!\n\n${generatedAccount}\n\n(Cooldown 10min activated)`);

        // update UI stock numbers & cooldown display
        refreshStockUI();
        refreshCooldownUI();

        // if current open file is same as generated, update display
        if (currentFile === genId) {
          updateAccountDisplay();
        }
        renderFileTabs();  // update counts on tabs

        // start cooldown timer for that specific gen
        const interval = setInterval(() => {
          if (cooldowns[genId] > 0) {
            cooldowns[genId] -= 1;
            refreshCooldownUI();
          } else {
            clearInterval(interval);
            refreshCooldownUI();
          }
        }, 1000);
      }

      // ---- setup event listeners (delegation for generate buttons) ----
      document.getElementById('generatorGrid').addEventListener('click', (e) => {
        const btn = e.target.closest('.gen-btn');
        if (!btn) return;
        if (btn.disabled) return;
        const genId = btn.getAttribute('data-gen');
        if (genId) handleGenerate(genId);
      });

      // ---- initial render & auto restock (every 45 seconds) ----
      renderGenerators();
      renderFileTabs();
      updateAccountDisplay();
      refreshCooldownUI();
      updateGlobalStock();

      // simulate file restock (like automatic restock)
      setInterval(() => {
        restockFiles();
      }, 45000); // 45 seconds

      // Also ensure cooldown persists no timer for cooldowns already started.
      // but initial cooldowns are zero. we also need to handle page reload, but cooldown resets (simulated)
      // for demo we add a manual extra restock after 10 seconds
      setTimeout(() => {
        restockFiles();   // immediate restock to show activity
      }, 5000);

      // bonus: if user wants to see "automatic file for account restock like netflix.txt" — we have it.
    })();
  </script>
</body>
</html>
